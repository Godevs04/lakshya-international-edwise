name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Deployment platform
        required: true
        default: docker
        type: choice
        options:
          - docker
          - fly
          - vps
          - vercel
          - skip
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      environment:
        required: true
        type: string
      release_tag:
        required: false
        type: string
        default: ""
      release_version:
        required: false
        type: string
        default: ""
    secrets: inherit

env:
  RELEASE_PROPERTIES_FILE: .github/workflows/release/release.properties

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Pre-deploy checks
    uses: ./.github/workflows/ci.yml

  resolve-release:
    name: Resolve release version
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      checkout_ref: ${{ steps.release.outputs.checkout_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read release.properties
        id: release
        run: |
          chmod +x scripts/release-version.sh
          PROPS="${RELEASE_PROPERTIES_FILE}"

          TAG_INPUT="${{ inputs.release_tag }}"
          VERSION_INPUT="${{ inputs.release_version }}"

          if [ -n "$TAG_INPUT" ]; then
            VERSION="${VERSION_INPUT:-${TAG_INPUT#v}}"
            TAG="$TAG_INPUT"
          else
            mapfile -t lines < <(scripts/release-version.sh read)
            for line in "${lines[@]}"; do
              key="${line%%=*}"
              value="${line#*=}"
              case "$key" in
                version) VERSION="$value" ;;
                tag) TAG="$value" ;;
              esac
            done
          fi

          if [ -z "${VERSION:-}" ] || [ -z "${TAG:-}" ]; then
            echo "Could not resolve version from ${PROPS}" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying ${TAG} (version ${VERSION})"

  resolve-platform:
    name: Choose platform
    needs: resolve-release
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.pick.outputs.platform }}
      build_image: ${{ steps.pick.outputs.build_image }}
      image: ${{ steps.pick.outputs.image }}
      version: ${{ needs.resolve-release.outputs.version }}
      tag: ${{ needs.resolve-release.outputs.tag }}
      checkout_ref: ${{ needs.resolve-release.outputs.checkout_ref }}
    steps:
      - name: Resolve deploy platform
        id: pick
        run: |
          PLATFORM="${{ inputs.platform }}"
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"

          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

          if [ "$PLATFORM" = "docker" ] || [ "$PLATFORM" = "vps" ]; then
            echo "build_image=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_image=false" >> "$GITHUB_OUTPUT"
          fi

  build-image:
    name: Build Docker image
    needs: resolve-platform
    if: needs.resolve-platform.outputs.build_image == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-platform.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ needs.resolve-platform.outputs.image }}:latest
            ${{ needs.resolve-platform.outputs.image }}:${{ needs.resolve-platform.outputs.tag }}
            ${{ needs.resolve-platform.outputs.image }}:${{ needs.resolve-platform.outputs.version }}
            ${{ needs.resolve-platform.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-docker:
    name: Publish to GHCR
    needs: [resolve-platform, build-image]
    if: needs.resolve-platform.outputs.platform == 'docker'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Published ${{ needs.resolve-platform.outputs.image }}:${{ needs.resolve-platform.outputs.tag }}"
          echo "Pull: docker pull ${{ needs.resolve-platform.outputs.image }}:${{ needs.resolve-platform.outputs.tag }}"

  deploy-vps:
    name: Deploy to VPS
    needs: [resolve-platform, build-image]
    if: needs.resolve-platform.outputs.platform == 'vps'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ needs.resolve-platform.outputs.image }}:${{ needs.resolve-platform.outputs.tag }}
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE,GHCR_USER,GHCR_TOKEN,DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/nandhini-consultancy}"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            export IMAGE
            docker compose -f docker-compose.prod.yml pull app || docker pull "$IMAGE"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

  deploy-fly:
    name: Deploy to Fly.io
    needs: resolve-platform
    if: needs.resolve-platform.outputs.platform == 'fly'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-platform.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-vercel:
    name: Deploy to Vercel
    needs: resolve-platform
    if: needs.resolve-platform.outputs.platform == 'vercel'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-platform.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  skip-deploy:
    name: Skip deploy
    needs: resolve-platform
    if: needs.resolve-platform.outputs.platform == 'skip'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Deploy skipped — checks passed."
          echo "Release version: ${{ needs.resolve-platform.outputs.tag }}"
