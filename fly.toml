# Fly.io — deploy with: fly launch && fly secrets import < .env.local && fly deploy
# Docs: https://fly.io/docs/languages-and-frameworks/nextjs/

app = "lakshya-international-edwise"
primary_region = "bom"

[build]
  dockerfile = "deploy/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"
  HOSTNAME = "0.0.0.0"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "40s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
