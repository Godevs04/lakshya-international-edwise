# VPS / dedicated server — use with docker-compose.prod.yml
# 1. Copy this repo to the server
# 2. Create .env.local with production secrets
# 3. docker compose -f docker-compose.prod.yml up -d

services:
  app:
    image: ${IMAGE:-ghcr.io/owner/nandhini-consultancy:latest}
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      PORT: 4000
      HOSTNAME: 0.0.0.0
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  redis_data:
